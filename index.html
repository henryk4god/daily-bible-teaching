<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Daily Bible teaching widget with sharing features"/>
  <meta name="theme-color" content="#4CAF50"/>
  <title>Daily Bible Teaching Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <a href="#bible-teaching-widget" class="skip-link">Skip to main content</a>

  <main id="bible-teaching-widget" aria-labelledby="widget-title">
    <header class="widget-header">
      <h1 id="widget-title">Daily Bible Teaching</h1>
      <time id="current-date" aria-live="polite"></time>
    </header>

    <article id="teaching-content" class="widget-content" aria-live="polite">
      <p>Loading today's teaching...</p>
    </article>

    <footer class="widget-footer">
      <button id="share-btn" class="control-btn" aria-label="Share this teaching">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
        </svg>
        <span>Share</span>
      </button>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
